# 景区 AI 伴游硬件用户故事

## 1. 购买场景：把“黄小西”带回家的贵州旅行伴游

李女士一家三口第一次来贵州，准备游览黄果树、梵净山和周边景区。他们对贵州山水、民族文化、美食和非遗都很感兴趣，但不熟悉景区路线，也不想为了几天行程反复下载 App、注册账号、查攻略、切换地图。

在高铁站、机场文旅展位或景区入口，李女士看到一款带有“黄小西”IP 形象的 AI 伴游硬件。它可以是苗风智能骨传导耳机、胸牌、挂脖设备、眼镜或玩偶形态。陈列区写着：

> “买一个黄小西带着走。听贵州故事，问景区路线，拍照识景，离开景区后还能继续听贵州。”

李女士选择购买一台适合亲子家庭的黄小西伴游设备。开机后完成设备激活，设备绑定购买订单和设备 ID，黄小西用 30 秒完成新手引导：

> “你好，我是黄小西。你可以问我景点怎么走、这里有什么故事、附近哪里有洗手间，也可以让我帮你识别眼前的风景。今天我陪你游贵州。”

从这一刻开始，这台设备不只是一次性导览器，而是游客购买后可持续使用的贵州旅行入口。

## 2. 入园场景：从“看风景”变成“懂风景”

一家人进入景区后，设备根据当前位置和景区 POI 判断他们接近核心景点。距离观景点约 100 米时，黄小西主动提醒：

> “前方约 100 米就是黄果树大瀑布观景台。这里是贵州最有代表性的自然景观之一。我可以边走边给你讲它的形成原因和相关故事。”

孩子马上问：

> “黄小西，为什么这里会有这么大的瀑布？”

黄小西用孩子听得懂的语言解释水系、地貌和瀑布形成原因；李女士继续问苗族文化、附近美食、游览顺序和拍照点位时，黄小西切换为成人旅行助手的表达方式。

在这个场景里，游客不再只是听固定讲解，而是可以围绕当前位置连续追问。黄小西需要理解“这里”“刚才那个景点”“这个瀑布”等指代，并保留最近多轮上下文，让讲解从单向播报变成陪伴式对话。

## 3. 路线场景：少看手机，直接问黄小西怎么走

游览途中，李女士问：

> “黄小西，最近的洗手间怎么走？”

设备采集语音、当前位置、方向、网络状态和设备形态，并把这些信息上传给云端。云端识别出游客要找“洗手间”，匹配最近 POI，结合景区路网生成路线。黄小西播报：

> “从你现在的位置向前走约 80 米，到石桥后右转，再沿主路走 50 米，右手边就是洗手间。我会在转弯处提醒你。”

如果一家人走偏，设备继续上报位置变化，云端判断偏航后重新规划路线：

> “你现在偏离了刚才的路线，可以从前方岔路左转回到主路。”

如果定位不稳定，黄小西降级为地标化指引：

> “我现在定位不太稳定。你可以先往游客中心方向走，看到蓝色指示牌后向右。”

这条链路背后的技术逻辑是：硬件负责听清楚、知道自己在哪、把状态报上来、把结果播出去；云端负责听懂意图、匹配 POI、计算路线、判断偏航并生成适合语音播报的指引。

## 4. 识景和 AR 场景：让景点变成可互动内容

到达标志性景点后，孩子按下拍照键，对准眼前的瀑布、古建筑或民族文化展示区拍照。设备压缩图片，并附带位置、时间、设备 ID 和设备形态上传。黄小西识别后播报：

> “我识别到你拍的是黄果树大瀑布观景区。这个角度能看到瀑布主体和水雾景观，我可以给你讲一个和这里有关的故事。”

如果设备是眼镜或带屏胸牌，黄小西还可以展示景点标签、路线箭头、历史复原、民族文化动效或 AR 内容入口。游客拍下的照片和 AR 内容，可以通过订单号、取件码或可选账号绑定取回。

这个场景让黄小西从“讲解设备”升级为“内容互动入口”。年轻游客获得拍照打卡和社交传播点，亲子家庭获得故事化互动，景区获得景点热度、拍照点位和内容消费数据。

## 5. 弱网场景：有网完整体验，弱网不崩，断网有底线

贵州景区常见山地、峡谷、瀑布、溶洞和人流密集区域，网络不稳定是高概率事件。李女士走到信号较弱的区域时，黄小西不会直接失效，而是提醒：

> “当前网络较弱，我先根据本地缓存为你提供核心讲解和基础方向提示。网络恢复后，我会继续更新路线和内容。”

离线状态下，设备仍能播放多语言欢迎语、核心景点讲解、基础设施 POI 和固定路线提示。实时天气、实时客流、在线识景和复杂交通建议需要联网时，黄小西会明确告知：

> “这个问题需要联网确认。我现在可以先给你基础建议，网络恢复后再补充实时信息。”

这个场景要求设备具备本地缓存、离线唤醒、基础 POI、基础路线和断网提示能力。核心体验不能完全依赖游客手机，也不能因为短时弱网让游客觉得设备不可用。

## 6. 非景区使用场景：买走之后，黄小西仍然可用

游览结束后，李女士把黄小西带回酒店、带上返程高铁，也可以带回外地继续使用。孩子回程路上继续问：

> “黄小西，今天我们去过哪些地方？”

黄小西可以根据当天会话和内容包，继续讲今天游览过的景点故事，也可以推荐下一站贵州行程：

> “你今天去了黄果树大瀑布和陡坡塘。下次如果还想看贵州山水，可以去梵净山；如果想了解民族文化，可以去西江千户苗寨。”

第二天在贵阳市区，李女士问：

> “黄小西，今天不进景区，想吃贵州特色美食，怎么安排？”

黄小西可以回答贵州旅游问题，推荐美食、非遗体验、城市散步路线、交通衔接和伴手礼。回到全国其他城市后，黄小西仍然可以作为贵州旅行助手和闲聊陪伴继续使用：

> “下次来贵州适合什么时候？”  
> “贵州有哪些适合带孩子去的地方？”  
> “给我讲一个苗族银饰的故事。”  
> “陪我聊聊今天旅行里最好玩的地方。”

硬件能力从景区延伸到贵州全域，再延伸到游客离开贵州后的持续触达：

- 游客获得可带走的贵州文旅 IP 硬件和持续内容服务。
- 景区获得硬件销售收入、内容触达数据和二次到访线索。
- 文旅局获得一个可覆盖贵州全域、并能在全国范围持续传播贵州内容的智能入口。
- 运营方可以围绕能力升级、内容包、AR 内容、多景区权益、流量服务和售后服务设计持续收入。

这台设备可以从“一次旅行中的导览工具”，延展为“贵州全域旅行助手”“可闲聊的黄小西陪伴终端”和“可持续升级的文旅内容入口”。

## 7. 长尾收益场景：能力持续升级，收益持续发生

李女士一家回到外地后，黄小西没有变成闲置设备。它可以继续回答贵州旅游问题、讲贵州故事、做下一次行程规划，也可以通过云端升级不断获得新能力。

第一次使用时，黄小西主要解决景区讲解、路线指引和识景问题；后续能力升级后，可以增加更多贵州全域服务：

- 新增景区内容包，如梵净山、西江千户苗寨、荔波小七孔、青岩古镇等。
- 新增节庆和专题内容，如苗年、侗族大歌、村超、村 BA、非遗体验路线。
- 新增亲子、年轻人、银发团、外国游客等不同人群的讲解风格。
- 新增 AR 内容、拍照玩法、任务打卡和纪念内容。
- 新增闲聊陪伴、旅行回忆、贵州知识问答和下次行程推荐。

长尾收益来自四个方向：

- **内容长尾：** 持续更新贵州景区、非遗、美食、节庆、路线和故事内容。
- **景区长尾：** 从单个景区扩展到多景区、多城市、多线路。
- **用户长尾：** 一次购买后，可覆盖游客本人、亲子家庭成员和后续同行人。
- **能力长尾：** 通过云端模型、内容库、语音、识景、AR 和闲聊能力持续升级，让已售设备继续变强。
- **商业长尾：** 后续可探索内容包、AR 包、多景区权益、流量服务、能力升级包、联名硬件和文创售后。

## 8. 租赁补充场景

对于不愿直接购买的游客，景区可提供租赁版本。游客在入口通过柜台、自助机或线上渠道支付押金和租金，领取设备后完成临时会话绑定和语言初始化。游览结束后，游客归还设备，运营人员检查状态、清理数据、消毒、充电，并将设备重新放回可租库存。

租赁适合旺季快速验证游客热度、使用频次、租赁转化率、单台日均收入、设备损耗率和现场运维压力；购买适合验证 IP 硬件、文创售卖、持续内容服务和长尾收益。

## 附件：

### A. 核心使用场景

- **购买激活：** 游客在机场、高铁站、景区入口或文创店购买黄小西设备，完成激活、内容预置和新手引导。
- **语音伴游：** 游客通过唤醒词、按键或触控发起问答，覆盖景点讲解、贵州文化、美食、交通、住宿、购物和旅行建议。
- **路线指引：** 支持主动问路、接近景点提醒、偏航纠正、定位不稳定时的地标化指引。
- **拍照识景和 AR：** 支持拍照识别景点、生成讲解、触发 AR 内容或照片取回。
- **弱网离线：** 核心讲解、欢迎语、基础 POI 和基础路线本地缓存，弱网降级可用。
- **非景区延展：** 购买设备离开景区后，仍可在贵州全域和全国其他地方回答贵州旅游问题、闲聊陪伴、规划下一次行程，并作为后续内容入口。

### B. 技术方案逻辑

| 环节   | 硬件侧                | 云端侧                     |
| ---- | ------------------ | ----------------------- |
| 语音问答 | 采集语音、降噪、唤醒、播放 TTS  | ASR、意图识别、LLM 问答、内容安全    |
| 路线指引 | 上报位置、方向、电量、网络、缓存状态 | POI 匹配、路线规划、偏航判断、播报生成   |
| 主动提醒 | 基于位置触发或上报位置变化      | 判断触发范围、景点优先级、是否重复播报     |
| 拍照识景 | 拍照、压缩、上传图片和位置信息    | 景点识别、置信度判断、讲解生成、AR 内容匹配 |
| 弱网离线 | 本地缓存内容包、基础路线、离线唤醒  | 网络恢复后同步状态、更新内容、补充实时信息   |
| 运营管理 | 设备 ID、激活、绑定、状态上报   | 订单、设备档案、内容版本、数据看板、售后管理  |

| 阶段    | 收益或验证点                            |

| 购买    | 硬件销售收入、IP 文创收入、设备激活数据             |
| 使用    | 问答、讲解、导航、识景、AR 的真实体验数据            |
| 非景区使用 | 贵州旅游问答、闲聊陪伴、行程回顾、后续景区推荐           |

### D. 项目组实施方向

项目从 0-1 到落地，需要按“先定义体验闭环，再确定软硬件分工，再做样机联调，最后进入小规模投放验证”的方式推进。

| 阶段        | 项目组重点工作                                   | 主要交付物              |
| --------- | ----------------------------------------- | ------------------ |
| 0：方向定义    | 明确目标用户、购买主场景、租赁补充场景、核心体验和商业闭环             | 用户故事、汇报版方案、核心场景清单  |
| 1：需求拆解    | 拆解 AI 能力、硬件形态、联网、定位、音频、识景、AR、离线、运营和隐私要求   | PRD、硬件能力清单、接口字段草案  |
| 2：厂商选型    | 对比骨传导耳机、胸牌、挂脖、眼镜、玩偶等形态，评估成本、交期、开放能力和量产风险  | 厂商评估表、样机清单、报价和风险表  |
| 3：软件侧内容准备 | 建设景区讲解、贵州全域问答、美食非遗、路线 POI、多语言内容和离线内容包     | 内容库、问答集、POI 数据、离线包 |
| 4：样机联调    | 打通语音采集、ASR、LLM、TTS、定位上报、路线指引、识景、AR、设备状态回传 | 样机 Demo、联调记录、问题清单  |
| 5：运营闭环    | 设计购买激活、租赁归还、设备绑定、照片取回、内容升级、售后和数据看板        | 运营 SOP、后台需求、售后流程   |
| 6：小规模投放   | 在试点景区进行真实游客测试，验证体验、购买、租赁、续航、弱网、损耗和收入      | 试点数据报告、商业测算、迭代建议   |

#### D.2 项目组需要统筹的能力

- **产品统筹：** 确定购买主线、租赁补充、核心体验优先级和阶段范围，避免硬件形态过多导致落地分散。
- **内容统筹：** 建设贵州文旅知识、景区讲解、路线 POI、非遗美食、亲子故事、多语言表达和持续更新机制。
- **技术统筹：** 定义硬件与云端接口、设备状态字段、数据安全边界、弱网降级策略和联调验收标准。
- **商务统筹：** 推进硬件厂商报价、样机、交期、认证、量产能力、售后责任和持续服务费用确认。
- **运营统筹：** 设计购买激活、设备绑定、租赁归还、消毒充电、库存状态、故障处理和游客售后闭环。
- **数据统筹：** 建立购买转化、租赁转化、问答使用、路线完成、识景成功、离线可用、复购续费和长尾触达指标。

#### D.3 软件方需提供的能力

| 能力         | 说明                                           |
| ---------- | -------------------------------------------- |

#### D.5 联调和验收交付物

- **样机演示：** 至少完成购买激活、语音问答、景点讲解、路线指引、弱网提示和设备状态上报。
- **接口文档：** 明确设备 ID、会话 ID、位置、网络、电量、缓存、故障、语音、图片和播放控制字段。
- **内容包验证：** 完成核心景点讲解、欢迎语、基础 POI、基础路线和离线提示的下发与播放。
- **运营验证：** 完成购买激活、租赁补充、归还清理、消毒充电、库存状态和故障处理流程。
- **数据看板：** 能看到设备激活、在线状态、使用次数、问答次数、路线请求、识景次数、离线次数和收入数据。
- **投放评估：** 输出试点景区体验反馈、硬件问题、AI 问题、运营问题、成本收入和下一阶段迭代建议。

### E. 重点验证指标

- **购买转化率：** 到访游客中购买设备或购买套装的比例。
- **租赁转化率：** 到访游客中租赁设备的比例。
- **激活成功率：** 购买或租赁后成功完成开机引导和首次交互的比例。
- **路线指引完成率：** 游客发起问路后成功到达目的地的比例。
- **识景成功率：** 拍照识别结果准确且游客认可的比例。
- **AR 互动率：** 可展示设备中触发 AR 内容的比例。
- **离线可用成功率：** 弱网/断网下核心讲解和基础路线可用的比例。
- **单台收入：** 设备售卖收入、租赁收入和后续内容收入的合计。
- **复购和续费：** 内容包、AR 包、多景区权益、能力升级包或联名硬件的后续购买情况。
- **长尾触达：** 非景区场景下设备继续被唤醒、继续问答、继续播放内容和继续闲聊的次数。
